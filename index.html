<!DOCTYPE html>
<html lang="en" ng-app="app">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">

    <!-- CSS -->

    <link rel="shortcut icon" href="assets/img/icon.png">

    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.6.10/angular.min.js"></script>
    <script>
        var app = angular.module('app', []);
        app.controller('MainCtrl', function ($http) {
            var vm = this;
                vm.loading = true;
                $http.get('https://api.github.com/users/fadhalshulhan').then(function (res) {
                    vm.name = res.data.name;
                    vm.location = res.data.location;
                    vm.public_repos = res.data.public_repos;
                 
                 
                    vm.loading = false;
                })
        })
    </script>

    <title>Fadhal Shulhan</title>

    <style>
        html,
        body {
            font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #F2F4FA;
            height: 100%; 
            background-position: center;
            background-repeat: repeat;
            background-size: cover;
         }

        .background {
            position: absolute;
            display: block;
            top: 0;
            left: 0;
            z-index: 0;
        }
	
    </style>


</head>

<body ng-controller="MainCtrl as vm">

    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <a class="navbar-brand" href="https://fadhalshulhan.github.io/index.html">
            <img src="assets/img/icon.png" width="30" height="30" class="d-inline-block align-top" alt=""> Fadhal Shulhan</a>
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarSupportedContent" aria-controls="navbarSupportedContent"
            aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav mr-auto">
                <li class="nav-item active">
                    <a class="nav-link" href="https://fadhalshulhan.github.io/index.html">Home
                        <span class="sr-only">(current)</span>
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="https://www.linkedin.com/in/fadhalshulhan/" target="_blank">About
                        <span class="sr-only">(current)</span>
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="https://dribbble.com/fadhalshulhan" target="_blank">Portfolio
                        <span class="sr-only">(current)</span>

        </div>
    </nav>
              
    <div class="container">
        <div class="d-inline-block text-center">
            <a href="https://goo.gl/JVqdUr" target="_blank">
                <figure>
                    <img height="70" width="70" src="assets/img/github.png" alt="#mygithub">
                    <figcaption>Github</figcaption>
                </figure>
            </a>
            <a href="https://goo.gl/qKXZeE" target="_blank">
                <figure>
                    <img height="70" width="70" src="assets/img/behance.png" alt="#mybehance">
                    <figcaption>Behance</figcaption>
                </figure>
            </a>
            <a href="https://goo.gl/sdA8jL" target="_blank">
                <figure>
                    <img height="70" width="70" src="assets/img/dribbble.png" alt="#mydribbble">

                </figure>
            </a>
            <a href="https://goo.gl/bYXZ1c" target="_blank">

                    <img height="65" width="65" src="assets/img/blog.png" alt="#myblog">

                </figure>
            </a>

            <h4 ng-if="vm.loading === true">Loading</h4>
